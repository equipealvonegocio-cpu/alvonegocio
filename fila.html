<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fila de Distribuição — Alvo Negócio</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: #080808;
  color: #F0F0F0;
  min-height: 100vh;
  padding: 20px;
  max-width: 600px;
  margin: 0 auto;
}
.topo { text-align: center; padding: 20px 0 28px; }
.topo img { height: 48px; margin-bottom: 12px; display: block; margin: 0 auto 10px; }
h1 { font-size: 20px; font-weight: 900; color: #00D84A; }
.sub { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 4px; }

/* CARD PRÓXIMO */
.card-vez {
  background: linear-gradient(135deg, #0f1a0f, #0a150a);
  border: 2px solid #00D84A;
  border-radius: 18px;
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: 0 0 40px rgba(0,216,74,0.12);
  text-align: center;
}
.vez-label { font-size: 10px; color: #00D84A; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
.vez-emoji { font-size: 36px; margin-bottom: 8px; }
.vez-nome { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
.vez-pos { font-size: 12px; color: rgba(255,255,255,0.35); margin-bottom: 16px; }
.vez-link {
  background: #0a0a0a;
  border: 1px solid rgba(0,216,74,0.2);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 12px;
  color: #00D84A;
  word-break: break-all;
  margin-bottom: 16px;
  text-align: left;
}

/* CONTADORES */
.contadores {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.cnt {
  background: #111;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 14px 10px;
  text-align: center;
}
.cnt-val { font-size: 24px; font-weight: 900; color: #00D84A; }
.cnt-lab { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 2px; }

/* BOTÕES */
.btn {
  display: block;
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  font-family: inherit;
  transition: all 0.2s;
  margin-bottom: 10px;
  text-align: center;
}
.btn-copiar { background: #1a1a1a; color: #fff; border: 1px solid rgba(255,255,255,0.1); }
.btn-copiar:hover { background: #222; }
.btn-avancar { background: linear-gradient(135deg, #00D84A, #00BCD4); color: #000; font-size: 16px; }
.btn-avancar:hover { opacity: 0.9; transform: translateY(-1px); }
.copiado { text-align: center; color: #00D84A; font-size: 13px; font-weight: 600; margin-bottom: 8px; display: none; }

/* FILA */
.card-fila {
  background: #111;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
}
.card-fila h3 { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }
.membro {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.membro:last-child { border-bottom: none; }
.m-num {
  width: 26px; height: 26px; border-radius: 50%;
  background: #1a1a1a;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.3);
  flex-shrink: 0;
}
.m-num.ativo { background: #00D84A; color: #000; }
.m-nome { font-size: 13px; font-weight: 600; flex: 1; }
.m-badge {
  font-size: 9px; font-weight: 700;
  background: rgba(0,216,74,0.15);
  color: #00D84A;
  border: 1px solid rgba(0,216,74,0.3);
  padding: 3px 8px; border-radius: 20px;
}

/* RESET */
.btn-reset {
  display: block; width: 100%;
  padding: 10px; border-radius: 10px;
  font-size: 12px; font-weight: 600;
  cursor: pointer; border: 1px solid rgba(255,255,255,0.08);
  background: transparent; color: rgba(255,255,255,0.3);
  font-family: inherit; transition: all 0.2s;
}
.btn-reset:hover { color: #fff; border-color: rgba(255,255,255,0.2); }

/* MENSAGEM */
.card-msg {
  background: #111;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 16px;
}
.card-msg h3 { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
.msg-preview {
  background: #0a0a0a;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 14px;
  font-size: 12px;
  line-height: 1.8;
  color: #ccc;
  white-space: pre-wrap;
  max-height: 220px;
  overflow-y: auto;
}
</style>
</head>
<body>

<div class="topo">
  <img src="Logo%20Alvo%20negocio.png" alt="Alvo Negócio">
  <h1>🔄 Fila de Distribuição</h1>
  <p class="sub">Sistema automático — Equipe Alvo Negócio</p>
</div>

<div class="contadores">
  <div class="cnt">
    <div class="cnt-val" id="cnt-total">0</div>
    <div class="cnt-lab">Total enviados</div>
  </div>
  <div class="cnt">
    <div class="cnt-val" id="cnt-pos">1</div>
    <div class="cnt-lab">Vez na fila</div>
  </div>
  <div class="cnt">
    <div class="cnt-val">9</div>
    <div class="cnt-lab">Na equipe</div>
  </div>
</div>

<div class="card-vez">
  <div class="vez-label">⭐ Próximo a receber</div>
  <div class="vez-emoji">👤</div>
  <div class="vez-nome" id="vez-nome">—</div>
  <div class="vez-pos" id="vez-pos">—</div>
  <div class="vez-link" id="vez-link">—</div>
</div>

<div class="copiado" id="copiado">✅ Mensagem copiada!</div>
<button class="btn btn-copiar" onclick="copiar()">📋 Copiar mensagem de parabéns</button>
<button class="btn btn-avancar" onclick="avancar()">✅ Enviado — Avançar para o próximo →</button>

<div class="card-msg">
  <h3>📩 Mensagem que será enviada ao membro</h3>
  <div class="msg-preview" id="msg-preview">—</div>
</div>

<div class="card-fila">
  <h3>👥 Ordem da fila</h3>
  <div id="lista"></div>
</div>

<button class="btn-reset" onclick="resetar()">🔄 Reiniciar fila do zero</button>

<script>
const FILA = [
  { nome: 'Viviane dos Santos Souza',    whats: '5511911110001', link: 'https://janrose.digital/viviane' },
  { nome: 'Laura Lima Souza',            whats: '5511911110002', link: 'https://janrose.digital/laura' },
  { nome: 'Regiane Soares de Freitas',   whats: '5511911110003', link: 'https://janrose.digital/regiane' },
  { nome: 'Munike',                      whats: '5511911110004', link: 'https://janrose.digital/munike' },
  { nome: 'Jonathan Araújo Oliveira',    whats: '5511911110005', link: 'https://janrose.digital/jonathan' },
  { nome: 'Valéria Emina',               whats: '5511911110006', link: 'https://janrose.digital/valeria' },
  { nome: 'José Marcos dos Santos Jr',   whats: '5511911110007', link: 'https://janrose.digital/josemarcos' },
  { nome: 'Douglas Leandro de Oliveira', whats: '5511911110008', link: 'https://janrose.digital/douglas' },
  { nome: 'Marília de Assis Debs',       whats: '5511911110009', link: 'https://janrose.digital/marilia' },
];

function pos() { return parseInt(localStorage.getItem('an_fila_pos') || '0'); }
function total() { return parseInt(localStorage.getItem('an_fila_total') || '0'); }
function membro() { return FILA[pos() % FILA.length]; }

function getMensagem(m) {
  return `🎉 PARABÉNS, ${m.nome}!\n\nVocê acaba de receber mais um novo distribuidor na sua equipe! 🚀\n\n━━━━━━━━━━━━━━━━━━━\n👤 Nome: [será preenchido automaticamente]\n📱 WhatsApp: [será preenchido automaticamente]\n━━━━━━━━━━━━━━━━━━━\n\nEsta pessoa foi direcionada para você pela Lia 💜\n\nEntre em contato e envie seu link de cadastro:\n👉 ${m.link}\n\nContinue crescendo! Sua equipe agradece 🌟`;
}

function atualizar() {
  const m = membro();
  const p = pos();
  const t = total();
  document.getElementById('vez-nome').textContent = m.nome;
  document.getElementById('vez-pos').textContent = `Posição ${p + 1} de ${FILA.length} na fila`;
  document.getElementById('vez-link').textContent = m.link;
  document.getElementById('msg-preview').textContent = getMensagem(m);
  document.getElementById('cnt-total').textContent = t;
  document.getElementById('cnt-pos').textContent = p + 1;

  const lista = document.getElementById('lista');
  lista.innerHTML = '';
  FILA.forEach((mb, i) => {
    const div = document.createElement('div');
    div.className = 'membro';
    div.innerHTML = `
      <div class="m-num ${i === p ? 'ativo' : ''}">${i + 1}</div>
      <div class="m-nome">${mb.nome}</div>
      ${i === p ? '<span class="m-badge">VEZ AGORA</span>' : ''}
    `;
    lista.appendChild(div);
  });
}

function copiar() {
  const m = membro();
  navigator.clipboard.writeText(getMensagem(m)).then(() => {
    const el = document.getElementById('copiado');
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 2500);
  });
}

function avancar() {
  const p = pos();
  const t = total();
  localStorage.setItem('an_fila_pos', (p + 1) % FILA.length);
  localStorage.setItem('an_fila_total', t + 1);
  atualizar();
}

function resetar() {
  if (confirm('Reiniciar fila do zero?')) {
    localStorage.setItem('an_fila_pos', '0');
    localStorage.setItem('an_fila_total', '0');
    atualizar();
  }
}

atualizar();
</script>
</body>
</html>
