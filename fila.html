<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fila Alvo Negócio — Lia</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', sans-serif;
  background: #080808;
  color: #F0F0F0;
  min-height: 100vh;
  padding: 20px;
  max-width: 560px;
  margin: 0 auto;
}
.topo { text-align: center; padding: 16px 0 24px; }
.topo img { height: 44px; display: block; margin: 0 auto 10px; }
h1 { font-size: 18px; font-weight: 900; color: #00D84A; }
.sub { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 4px; }

.card {
  background: #111;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 14px;
}
.card.destaque {
  border-color: #00D84A;
  box-shadow: 0 0 32px rgba(0,216,74,0.1);
  background: linear-gradient(135deg, #0f1a0f, #0a120a);
}
.label { font-size: 10px; font-weight: 700; color: #00D84A; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
.nome-grande { font-size: 20px; font-weight: 900; margin-bottom: 4px; }
.info-pequena { font-size: 12px; color: rgba(255,255,255,0.35); margin-bottom: 12px; }
.link-box {
  background: #0a0a0a;
  border: 1px solid rgba(0,216,74,0.2);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 12px;
  color: #00D84A;
  word-break: break-all;
  margin-bottom: 14px;
}

/* INPUTS novo distribuidor */
.grupo { margin-bottom: 12px; }
.grupo label { display: block; font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.grupo input {
  width: 100%;
  background: #1a1a1a;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 11px 14px;
  font-size: 14px;
  color: #fff;
  font-family: inherit;
  outline: none;
}
.grupo input:focus { border-color: #00D84A; }

/* BOTÕES */
.btn {
  display: block; width: 100%;
  padding: 14px; border-radius: 12px;
  font-size: 14px; font-weight: 700;
  cursor: pointer; border: none;
  font-family: inherit; transition: all 0.2s;
  margin-bottom: 10px; text-align: center;
  text-decoration: none;
}
.btn-whats {
  background: linear-gradient(135deg, #25D366, #128C7E);
  color: #fff; font-size: 15px;
}
.btn-whats:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-avancar {
  background: linear-gradient(135deg, #00D84A, #00BCD4);
  color: #000;
}
.btn-avancar:hover { opacity: 0.9; }
.btn-sec {
  background: #1a1a1a; color: #fff;
  border: 1px solid rgba(255,255,255,0.1);
}
.btn-reset {
  background: transparent; color: rgba(255,255,255,0.25);
  border: 1px solid rgba(255,255,255,0.08);
  font-size: 12px; padding: 10px;
  margin-top: 4px;
}

/* CONTADORES */
.cnts { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
.cnt { background: #111; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px 10px; text-align: center; }
.cnt-v { font-size: 22px; font-weight: 900; color: #00D84A; }
.cnt-l { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 2px; }

/* FILA */
.membro { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
.membro:last-child { border-bottom: none; }
.m-n { width: 26px; height: 26px; border-radius: 50%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.3); flex-shrink: 0; }
.m-n.ativo { background: #00D84A; color: #000; }
.m-info { flex: 1; }
.m-nome { font-size: 13px; font-weight: 600; }
.m-fone { font-size: 11px; color: rgba(255,255,255,0.25); }
.badge { font-size: 9px; font-weight: 700; background: rgba(0,216,74,0.15); color: #00D84A; border: 1px solid rgba(0,216,74,0.3); padding: 3px 8px; border-radius: 20px; }

.aviso { text-align: center; font-size: 12px; color: #00D84A; font-weight: 600; margin-bottom: 8px; display: none; }
.divisor { height: 1px; background: rgba(255,255,255,0.06); margin: 16px 0; }
</style>
</head>
<body>

<div class="topo">
  <img src="Logo%20Alvo%20negocio.png" alt="Alvo Negócio">
  <h1>🤖 Fila da Lia</h1>
  <p class="sub">Abra no celular da Lia para enviar as notificações</p>
</div>

<!-- CONTADORES -->
<div class="cnts">
  <div class="cnt"><div class="cnt-v" id="cnt-total">0</div><div class="cnt-l">Total enviados</div></div>
  <div class="cnt"><div class="cnt-v" id="cnt-pos">1</div><div class="cnt-l">Vez na fila</div></div>
  <div class="cnt"><div class="cnt-v" id="cnt-membros">9</div><div class="cnt-l">Na equipe</div></div>
</div>

<!-- PRÓXIMO DA FILA -->
<div class="card destaque">
  <div class="label">⭐ Próximo a receber cadastro</div>
  <div class="nome-grande" id="vez-nome">—</div>
  <div class="info-pequena" id="vez-pos">—</div>
  <div class="link-box" id="vez-link">—</div>
</div>

<!-- DADOS DO NOVO DISTRIBUIDOR -->
<div class="card">
  <div class="label">👤 Dados do novo distribuidor</div>
  <div class="grupo">
    <label>Nome completo</label>
    <input type="text" id="nd-nome" placeholder="Ex: Maria da Silva">
  </div>
  <div class="grupo">
    <label>WhatsApp com DDD</label>
    <input type="tel" id="nd-fone" placeholder="Ex: 11999887766">
  </div>
</div>

<!-- AÇÕES -->
<div class="aviso" id="aviso">✅ Notificação enviada!</div>

<button class="btn btn-whats" onclick="notificarWhatsApp()">
  📲 Notificar membro pelo WhatsApp da Lia
</button>

<button class="btn btn-avancar" onclick="avancar()">
  ✅ Avançar fila → próxima pessoa
</button>

<button class="btn btn-sec" onclick="copiarMsg()">
  📋 Só copiar a mensagem
</button>

<!-- FILA COMPLETA -->
<div class="card">
  <div class="label">👥 Ordem da fila</div>
  <div id="lista-fila"></div>
  <div class="divisor"></div>
  <button class="btn btn-reset" onclick="resetar()">🔄 Reiniciar fila do zero</button>
</div>

<script>
/* ══════════════════════════════════════
   LISTA DA EQUIPE
   Substitua pelos dados reais quando tiver
══════════════════════════════════════ */
const FILA = [
  { nome: 'Ismael Moraes', whats: '5511988189638', link: 'https://janrose.digital/consultor/ismaelmoraes' },
];
/* ══════════════════════════════════════ */

function getPosicao() { return parseInt(localStorage.getItem('an_fila_pos') || '0'); }
function getTotal()   { return parseInt(localStorage.getItem('an_fila_total') || '0'); }
function getMembro()  { return FILA[getPosicao() % FILA.length]; }

function getMensagem(membro, ndNome, ndFone) {
  return `🤖 *Mensagem da Lia — Alvo Negócio*\n\n` +
    `Olá, *${membro.nome}*! 🎉\n\n` +
    `A Lia acabou de indicar o seu link de cadastro para um novo distribuidor!\n\n` +
    `━━━━━━━━━━━━━━━━━\n` +
    `👤 *Nome:* ${ndNome || 'Novo distribuidor'}\n` +
    `📱 *WhatsApp:* ${ndFone || 'Não informado'}\n` +
    `━━━━━━━━━━━━━━━━━\n\n` +
    `Entre em contato com essa pessoa e envie seu link de cadastro:\n` +
    `👉 ${membro.link}\n\n` +
    `Oriente ela a:\n` +
    `1️⃣ Acessar o link acima e fazer o cadastro\n` +
    `2️⃣ Entrar em *janrose.digital*\n` +
    `3️⃣ Escolher o plano: R$197 ou R$297\n\n` +
    `*Parabéns por mais um cadastro na sua equipe!* 🚀💜`;
}

function notificarWhatsApp() {
  const membro = getMembro();
  const ndNome = document.getElementById('nd-nome').value.trim();
  const ndFone = document.getElementById('nd-fone').value.trim();
  const msg = encodeURIComponent(getMensagem(membro, ndNome, ndFone));
  window.open(`https://wa.me/${membro.whats}?text=${msg}`, '_blank');
  mostrarAviso();
}

function copiarMsg() {
  const membro = getMembro();
  const ndNome = document.getElementById('nd-nome').value.trim();
  const ndFone = document.getElementById('nd-fone').value.trim();
  navigator.clipboard.writeText(getMensagem(membro, ndNome, ndFone)).then(mostrarAviso);
}

function mostrarAviso() {
  const el = document.getElementById('aviso');
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2500);
}

function avancar() {
  const pos = getPosicao();
  const total = getTotal();
  localStorage.setItem('an_fila_pos', (pos + 1) % FILA.length);
  localStorage.setItem('an_fila_total', total + 1);
  document.getElementById('nd-nome').value = '';
  document.getElementById('nd-fone').value = '';
  atualizar();
}

function resetar() {
  if (confirm('Reiniciar fila do zero?')) {
    localStorage.setItem('an_fila_pos', '0');
    localStorage.setItem('an_fila_total', '0');
    atualizar();
  }
}

function atualizar() {
  const m = getMembro();
  const p = getPosicao();
  const t = getTotal();

  document.getElementById('vez-nome').textContent = m.nome;
  document.getElementById('vez-pos').textContent = `Posição ${p + 1} de ${FILA.length} na fila`;
  document.getElementById('vez-link').textContent = m.link;
  document.getElementById('cnt-total').textContent = t;
  document.getElementById('cnt-pos').textContent = p + 1;
  document.getElementById('cnt-membros').textContent = FILA.length;

  const lista = document.getElementById('lista-fila');
  lista.innerHTML = '';
  FILA.forEach((mb, i) => {
    const div = document.createElement('div');
    div.className = 'membro';
    div.innerHTML = `
      <div class="m-n ${i === p ? 'ativo' : ''}">${i + 1}</div>
      <div class="m-info">
        <div class="m-nome">${mb.nome}</div>
        <div class="m-fone">${mb.whats}</div>
      </div>
      ${i === p ? '<span class="badge">VEZ AGORA</span>' : ''}
    `;
    lista.appendChild(div);
  });
}

atualizar();
</script>
</body>
</html>
